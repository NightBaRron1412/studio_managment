<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Squircle background (Apple-style) -->
  <path d="M 256,8
           C 460,8 504,52 504,256
           C 504,460 460,504 256,504
           C 52,504 8,460 8,256
           C 8,52 52,8 256,8 Z"
        fill="#1B5552"/>
  <!-- Lighter teal layer for depth on top half -->
  <path d="M 256,8
           C 460,8 504,52 504,256
           L 8,256
           C 8,52 52,8 256,8 Z"
        fill="#226A66" opacity="0.55"/>

  <!-- Decorative star burst (Islamic geometry, subtle) -->
  <g opacity="0.10" stroke="#FBF8F3" stroke-width="1.5" fill="none">
    <circle cx="256" cy="256" r="218"/>
    <circle cx="256" cy="256" r="196"/>
    <g transform="translate(256 256)">
      <polygon points="0,-180 35,-35 180,0 35,35 0,180 -35,35 -180,0 -35,-35"/>
      <polygon points="0,-180 35,-35 180,0 35,35 0,180 -35,35 -180,0 -35,-35"
               transform="rotate(45)"/>
    </g>
  </g>

  <!-- Camera viewfinder hump (top) -->
  <rect x="180" y="124" width="120" height="58" rx="14" fill="#FBF8F3"/>
  <rect x="180" y="124" width="120" height="14" rx="7" fill="#FFFFFF" opacity="0.6"/>

  <!-- Camera body -->
  <rect x="68" y="170" width="376" height="252" rx="38" fill="#FBF8F3"/>
  <!-- Top highlight strip -->
  <rect x="68" y="170" width="376" height="40" rx="38" fill="#FFFFFF" opacity="0.55"/>
  <!-- Subtle horizontal accent -->
  <rect x="92" y="220" width="328" height="2" fill="#1B5552" opacity="0.10"/>

  <!-- Mode dial (top-left) -->
  <circle cx="118" cy="208" r="16" fill="#1B5552" opacity="0.15"/>
  <circle cx="118" cy="208" r="8" fill="#E8B85C"/>
  <circle cx="118" cy="208" r="3" fill="#B07F1D"/>

  <!-- Flash window (top-right) -->
  <rect x="368" y="196" width="42" height="22" rx="6" fill="#1B5552" opacity="0.65"/>
  <rect x="372" y="200" width="34" height="14" rx="3" fill="#E8B85C"/>
  <rect x="372" y="200" width="34" height="6" rx="3" fill="#FFFFFF" opacity="0.35"/>

  <!-- LENS: outer ring -->
  <circle cx="256" cy="298" r="116" fill="#1B1F24"/>
  <circle cx="256" cy="298" r="116" fill="#FFFFFF" opacity="0.06"/>

  <!-- Lens metal ring -->
  <circle cx="256" cy="298" r="105" fill="#3A4047"/>
  <circle cx="256" cy="298" r="100" fill="#1B1F24"/>

  <!-- Inner glass rings -->
  <circle cx="256" cy="298" r="86" fill="#226A66"/>
  <circle cx="256" cy="298" r="78" fill="#163E3C"/>
  <circle cx="256" cy="298" r="62" fill="#0F2A29"/>

  <!-- Aperture suggestion (octagon) -->
  <polygon
    points="256,236 296,248 318,278 318,318 296,348 256,360 216,348 194,318 194,278 216,248"
    fill="none" stroke="#FBF8F3" stroke-width="1.2" opacity="0.30"/>

  <!-- Glass specular highlights -->
  <ellipse cx="226" cy="266" rx="34" ry="22" fill="#FFFFFF" opacity="0.22"/>
  <circle cx="222" cy="262" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="222" cy="262" r="4" fill="#FFFFFF"/>

  <!-- Tiny secondary lens flare -->
  <circle cx="290" cy="332" r="5" fill="#FFFFFF" opacity="0.45"/>

  <!-- Recording indicator dot -->
  <circle cx="380" cy="392" r="8" fill="#DC2626"/>
  <circle cx="380" cy="392" r="4" fill="#FFFFFF" opacity="0.5"/>
</svg>
