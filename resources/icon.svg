<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Squircle background gradient: deep teal → emerald → soft gold accent -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A29"/>
      <stop offset="55%" stop-color="#1B5552"/>
      <stop offset="100%" stop-color="#2F857F"/>
    </linearGradient>
    <!-- Camera body highlight -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#E5DDC9"/>
    </linearGradient>
    <!-- Outer lens ring -->
    <radialGradient id="lensOuter" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#3A4047"/>
      <stop offset="60%" stop-color="#1B1F24"/>
      <stop offset="100%" stop-color="#0A0D10"/>
    </radialGradient>
    <!-- Inner glass -->
    <radialGradient id="lensGlass" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7DC0BA"/>
      <stop offset="60%" stop-color="#226A66"/>
      <stop offset="100%" stop-color="#0F2A29"/>
    </radialGradient>
    <!-- Specular highlight on glass -->
    <radialGradient id="glassShine" cx="0.35" cy="0.3" r="0.35">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft inner glow on the squircle -->
    <radialGradient id="innerGlow" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Squircle background (Apple-style rounded square) -->
  <path d="M 256,0
           C 460,0 512,52 512,256
           C 512,460 460,512 256,512
           C 52,512 0,460 0,256
           C 0,52 52,0 256,0 Z"
        fill="url(#bg)"/>

  <!-- Subtle radial inner highlight -->
  <path d="M 256,0
           C 460,0 512,52 512,256
           C 512,460 460,512 256,512
           C 52,512 0,460 0,256
           C 0,52 52,0 256,0 Z"
        fill="url(#innerGlow)"/>

  <!-- Decorative geometric ring (Islamic-inspired star burst) -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1.5" fill="none">
    <circle cx="256" cy="256" r="220"/>
    <circle cx="256" cy="256" r="200"/>
    <g transform="translate(256 256)">
      <path d="M 0,-170 L 30,-30 L 170,0 L 30,30 L 0,170 L -30,30 L -170,0 L -30,-30 Z"/>
      <path d="M 0,-170 L 30,-30 L 170,0 L 30,30 L 0,170 L -30,30 L -170,0 L -30,-30 Z"
            transform="rotate(45)"/>
    </g>
  </g>

  <!-- Camera viewfinder hump -->
  <g filter="url(#shadow)">
    <rect x="180" y="120" width="120" height="56" rx="14" fill="url(#bodyGrad)"/>
  </g>

  <!-- Camera body -->
  <g filter="url(#shadow)">
    <rect x="80" y="160" width="352" height="240" rx="36" fill="url(#bodyGrad)"/>
  </g>

  <!-- Subtle horizontal accent line on body -->
  <rect x="100" y="210" width="312" height="1.5" fill="#0F2A29" opacity="0.08"/>

  <!-- Flash window -->
  <g>
    <rect x="370" y="190" width="36" height="20" rx="5" fill="#0F2A29" opacity="0.75"/>
    <rect x="374" y="194" width="28" height="12" rx="3" fill="#E8B85C" opacity="0.95"/>
  </g>

  <!-- Mode dial -->
  <circle cx="120" cy="200" r="14" fill="#0F2A29" opacity="0.4"/>
  <circle cx="120" cy="200" r="6" fill="#E8B85C"/>

  <!-- Lens outer barrel -->
  <circle cx="256" cy="288" r="108" fill="url(#lensOuter)"/>

  <!-- Lens ring details -->
  <circle cx="256" cy="288" r="100" fill="none" stroke="#0A0D10" stroke-width="2"/>
  <circle cx="256" cy="288" r="92" fill="none" stroke="#3A4047" stroke-width="1" opacity="0.6"/>

  <!-- Inner lens (glass) -->
  <circle cx="256" cy="288" r="78" fill="url(#lensGlass)"/>

  <!-- Aperture blades suggestion (soft octagon) -->
  <polygon
    points="256,222 296,234 318,266 318,310 296,342 256,354 216,342 194,310 194,266 216,234"
    fill="none" stroke="#0F2A29" stroke-width="1.2" opacity="0.35"/>

  <!-- Specular highlight on lens glass -->
  <circle cx="256" cy="288" r="78" fill="url(#glassShine)"/>

  <!-- Tiny lens flare -->
  <circle cx="232" cy="262" r="10" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="232" cy="262" r="4" fill="#FFFFFF" opacity="0.9"/>

  <!-- Recording indicator dot -->
  <circle cx="356" cy="370" r="6" fill="#DC2626"/>
  <circle cx="356" cy="370" r="6" fill="none" stroke="#DC2626" opacity="0.4" stroke-width="2">
    <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
