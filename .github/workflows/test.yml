name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # vitest runs in plain Node, but the project's postinstall script ran
      # electron-builder install-app-deps which built better-sqlite3 against
      # Electron's NODE_MODULE_VERSION. Rebuild against Node so the native
      # binding loads in the test process. (The pretest script does the
      # same thing locally.)
      - name: Rebuild better-sqlite3 for Node
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npx vitest run
