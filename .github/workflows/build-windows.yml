name: Build Windows Installer

# Triggers:
#  - push to main: builds installer and uploads as a downloadable artifact (90 days)
#  - push of a tag like v1.0.0: builds AND publishes a GitHub Release (powers auto-update)
#  - manual run: same as push to main, on demand

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed for "softprops/action-gh-release" on tag pushes

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build app (electron-vite)
        run: npm run build

      - name: Package Windows installer (NSIS x64) — non-tag
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --x64 --publish never

      - name: Package Windows installer (NSIS x64) — tag release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --x64 --publish always

      - name: Upload installer as artifact (non-tag builds only)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: studio-manager-windows-installer
          path: |
            dist-installer/*.exe
            dist-installer/*.exe.blockmap
            dist-installer/*.zip
            dist-installer/latest.yml
          retention-days: 90
          if-no-files-found: error
      # Note: on tag pushes, electron-builder's --publish always already uploads
      # to the GitHub Release. We do NOT add another upload step here, which is
      # what caused the duplicate "studio-manager-setup-..." files in v1.0.0.
